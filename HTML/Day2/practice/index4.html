<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="username">Username: </label> <input id="username" type="text" placeholder="username" name="username" required>
        <br>
        <br>
        <label for="password">Password: </label> <input type="password" id="password" placeholder="password" name="password" required>
        <br>
        <br>
        Gender: <label for="male">Male</label> <input type="radio" id="male" name="gender" value="male"> <label for="female">Female</label> <input type="radio" id="female" name="gender" value="female">
        <br>
        <br>
        <label for="email">Email: </label> <input type="email" id="email" name="email" placeholder="email">
        <br>
        <br>
        Skills: <label for="react">React</label> <input type="checkbox" id="react" name="skills" value="react"> <label for="html">HTML</label> <input type="checkbox" id="html" name="skills" value="react">
        <br>
        <br>
        <input type="submit">
        <br>
        <br>
        <input type="reset">
        <br>
        <br>
        <input type="search">
    </form>
</body>
</html>
