<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 90%;
            height: 500px;
            background-color: bisque;
            display: grid;
            grid-template-rows: 150px;
            grid-template-columns: 150px 150px 150px;
            align-content: center;
            align-items: center;
            justify-content: center;
            justify-items: center;
            grid-auto-flow: row;
            grid-auto-rows: 150px;

        }

        .item {
            width: 100px;
            height: 100px;
            background-color: rgb(255, 125, 125);
            border: 10px solid brown;
            border-radius: 20px;
        }

        .items1{
            grid-row: 1/3;
            grid-column:1/3;
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="items1 item">Item 1</div>
        <div class="items2 item">Item 2</div>
        <div class="items3 item">Item 3</div>
        <div class="items4 item">Item 1</div>
        <div class="items5 item">Item 2</div>
        <div class="items6 item">Item 3</div>
    </div>
</body>

</html>
