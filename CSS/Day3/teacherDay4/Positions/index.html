<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin-bottom: 2000px;
        }
        .container {
            width: 500px;
            height: 500px;
            background-color: bisque;
            position: absolute;
            left: 0px;
            top: 0px;
        }

        .item {
            width: 100px;
            height: 100px;
            background-color: rgb(255, 125, 125);
            border: 10px solid brown;
        }

        .items2 {
            position: sticky;
            top: 10px;
        }

        .items3 {
            position: fixed;
            right: 0;
            bottom: 0;
        }
    </style>
</head>

<body>
        <div class="container">
            <div class="items1 item">Item 1</div>
            <div class="items2 item">Item 2</div>
            <div class="items3 item">Item 3</div>
        </div>
</body>

</html>
