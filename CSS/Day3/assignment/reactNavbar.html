<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <nav>
        <div class="logo-area">
            <div class="reactLogo">
                <img src="./assets/logo_light.svg" alt="">
            </div>
            <div class="reactVersion">
                <p>v19.2</p>
            </div>
        </div>

        <div class="searchBar-area">
            <div class="search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="searchBar">
                <div class="search">
                    <div class="searchIcon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <div class="searchText">
                        <p>Search</p>
                    </div>
                </div>
                <div class="ctrl-k">
                    <div class="ctrl">
                        <p>ctrl</p>
                    </div>
                    <div class="k">
                        <p>k</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="menu">
            <div class="learn">
                <p>Learn</p>
            </div>
            <div class="div2">
                <p>
                    Reference
                </p>
            </div>
            <div class="div3">
                <p>
                    Community
                </p>
            </div>
            <div class="div4">
                <p>
                    Blog
                </p>
            </div>
        </div>

        <div class="icons">
            <div class="theme" style="background-color: rgb(35 39 47); color: aliceblue;">
                <i class="fa-solid fa-circle-half-stroke"></i>
            </div>
            <div class="translation" style="background-color: rgb(35 39 47); color: aliceblue;">
                <i class="fa-solid fa-language"></i>
            </div>
            <div class="github" style="background-color: rgb(35 39 47); color: aliceblue;">
                <i class="fa-brands fa-github"></i>
            </div>
        </div>
    </nav>
</body>

</html>
