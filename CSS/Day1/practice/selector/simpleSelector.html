<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #heading{
            background-color: #049a2f;
        }

        .fruits{
            background-color: #d6ab0f;
        }

        .apple{
            color: red;
        }
        
        .guava{
            color: #75d240;
        }

        .guava2{
            background-color: #ea9013;
        }

        .banana{
            color: #d6ab0f;
        }

        #bananaOverride{
            color: blue;
        }


    </style>
</head>
<body>
    <ul>
        <h1 id="heading">Fruits</h1>
        <li class="fruits">Mango</li>
        <li class="fruits apple">Apple</li>
        <li class="fruits guava guava2">Guava</li>
        <li class="fruits banana" id="bananaOverride">Banana</li>
        <li class="fruits">Papaya</li>
    </ul>
</body>
</html>
