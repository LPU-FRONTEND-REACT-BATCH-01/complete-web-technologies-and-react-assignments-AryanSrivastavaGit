<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        html {
            font-size: 10px;
        }

        h1,
        p {
            font-size: 2rem;
        }


        .div1 {
            font-size: 20px;
        }

        h1,
        p {
            font-size: 2em;
        }


        .div2 {
            width: 100%;
            height: 60px;
            background-color: #d45353;
        }

        .div2>div {
            width: 50%;
            height: 50%;
            background-color: #dfc417;

        }


        .div3 {
            width: 50vw;
            height: 60px;
            background-color: #0ea77c;
        }

        .div3>div {
            width: 50%;
            height: 50%;
            background-color: #dfc417;

        }


        .div4 {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
        }

        .div5 {
            font-weight: 600;
        }

        .div6 {
            font-size: large;
        }

        .div7 {
            font-style: italic;
        }

        .div8 {
            font-family: "Playwrite IE", cursive;
            font-optical-sizing: auto;
        }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
</head>

<body>
    <div class="div1">
        Parent div
        <h1>child h1</h1>
        <p>child p1</p>
        <p>child p2</p>
    </div>


    <div class="div2">
        <div></div>
    </div>


    <div class="div3">
        <div></div>
    </div>


    <div class="div4">
        <p>Font Family</p>
    </div>

    <div class="div5">
        <p>Font Weight</p>
    </div>

    <div class="div6">
        <p>Font size</p>
    </div>

    <div class="div7">
        <p>Font style</p>
    </div>


    <div class="div8">
        <p>Google Font</p>
    </div>

</body>

</html>
